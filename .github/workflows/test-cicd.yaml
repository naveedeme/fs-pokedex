name: Hello World CI/CD!
on:
  push:
    branches:
      - main
jobs:
  hello_world_job:
    runs-on: ubuntu-latest
    steps:
      - name: Hello World Step
        run: echo "Hello, World!"
      - name: Goodbye World Step
        run: echo "Goodbye, World!"
      - name: Print Date Step
        run: date
      - name: List Files Step
        run: ls -la
      - name: Final Step
        run: echo "This is the final step of the CI/CD pipeline."
